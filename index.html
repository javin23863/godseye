<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GOD'S EYE</title>
  <link rel="icon" href="data:," />
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="cesiumContainer"></div>
  <header id="brand">
    <h1>GOD'S EYE <span>VIEW</span></h1>
    <p>NO PLACE LEFT BEHIND</p>
  </header>
  <div id="status"></div>
  <div id="active-style">ACTIVE STYLE<br /><span id="style-name">NORMAL</span></div>
  <div id="style-dock">
    <div id="style-presets"></div>
    <div id="fx-controls">
      <label>BLOOM <input id="fx-bloom" type="checkbox" /></label>
      <label>SHARPEN <input id="fx-sharpen" type="range" min="0" max="100" value="0" /></label>
      <label>PIXELATE <input id="fx-pixelate" type="range" min="0" max="100" value="0" /></label>
    </div>
  </div>
  <aside id="panel">
    <section>
      <h2>MAP STACK</h2>
      <div id="basemaps"></div>
    </section>
    <section>
      <h2>DATA LAYERS</h2>
      <div id="layers"></div>
    </section>
    <section>
      <h2>SCENES</h2>
      <select id="city-select"></select>
      <div id="poi-chips"></div>
      <div id="shot-row">
        <button id="shot-capture" title="save current camera">+ SHOT</button>
        <span id="shot-chips"></span>
      </div>
      <button id="orbit-toggle">ORBIT ⟳</button>
    </section>
    <section>
      <h2>SEARCH</h2>
      <input id="search-box" type="search" placeholder="fly to place…" />
    </section>
  </aside>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
